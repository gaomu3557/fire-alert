name: fire check

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

env:
  LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - run: python main.py
